<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HP制作 営業テンプレ集</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Noto Sans JP', sans-serif; background: white; }
.brand { color: #1F3A2D; }
.bg-brand { background: #1F3A2D; }

<body class="px-6 py-12">
<div class="max-w-3xl mx-auto">
  <header class="border-b-2 pb-4 mb-10" style="border-color:#1F3A2D;">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
    <a href="./hearing-sheet.html" class="block border border-gray-300 rounded p-6 hover:border-gray-800 transition">
      <div class="text-[10px] tracking-widest font-bold brand mb-2">01 / HEARING</div>
      <h2 class="font-bold text-lg mb-2">ヒアリングシート</h2>

      <h2 class="font-bold text-lg mb-2">提案資料テンプレ</h2>
      <p class="text-[13px] text-gray-700 leading-relaxed">案件ごとに埋めて使う用。表紙・概要・サイト構成・デザイン方針・スコープ・料金・スケジュール・支払い条件。</p>
      <div class="text-[12px] mt-4 brand font-bold">開く →</div>
    </a>
  </div>

  <footer class="border-t-2 pt-4 mt-12 text-[11px] text-gray-500" style="border-color:#1F3A2D;">
    AI事業 — HP制作 / LINE構築 ・ © 2026
